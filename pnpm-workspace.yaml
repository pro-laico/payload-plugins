packages:
  - 'packages/*'
  - 'examples/*'
  - 'tools/*'
  - 'docs'
# Match Payload's monorepo conventions: save exact versions (no caret), isolated linker, and
# don't hoist workspace packages — so a package can only import what it actually declares.
savePrefix: ''
nodeLinker: isolated
hoistWorkspacePackages: false
allowBuilds:
  '@swc/core': true
  esbuild: true
  sharp: true
  unrs-resolver: true
# payload@3.85.1 pins undici exactly at 7.24.4, which is vulnerable (GHSA fixed in >=7.28.0).
# No newer payload exists, so override undici to a patched 7.x for payload's subtree only.
overrides:
  payload>undici: '^7.28.0'
