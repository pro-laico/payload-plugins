packages:
  - 'packages/*'
  - 'examples/*'
  - 'tools/*'
  - 'docs'
# Match Payload's monorepo conventions: save exact versions (no caret), isolated linker, and
# don't hoist workspace packages — so a package can only import what it actually declares.
savePrefix: ''
nodeLinker: isolated
hoistWorkspacePackages: false
allowBuilds:
  '@parcel/watcher': false
  '@swc/core': true
  esbuild: true
  sharp: true
  unrs-resolver: true
# payload@3.85.1 pins undici exactly at 7.24.4, which is vulnerable (GHSA fixed in >=7.28.0).
# No newer payload exists, so override undici to a patched 7.x for payload's subtree only.
# payload also pins tsx exactly at 4.22.4, whose namespaced tsImport() (payload's bin.js wraps the
# whole CLI in it) taints CJS `node:` builtin requires with `?tsx-namespace=…` under Node 24's sync
# module hooks — breaking every custom `payload <bin-script>` (e.g. `payload seed`) with
# ENOENT node:crypto. Still broken in tsx 4.22.5; 4.19.4 predates the namespace rework and works.
# next 16 optionally pulls sharp 0.34, which pnpm hoists — so payload's SharpDependency types
# resolved 0.34's Sharp/Metadata while apps import 0.35 (FormatEnum gained 'vips' → incompatible,
# forcing `as unknown as SharpDependency` casts). Pin one sharp everywhere so the casts can go.
overrides:
  payload>undici: '^7.28.0'
  sharp: '^0.35.2'
  tsx: '4.19.4'
