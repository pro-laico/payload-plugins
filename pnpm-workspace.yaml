packages:
  - 'packages/*'
  - 'examples/*'
  - 'tools/*'
  - 'docs'
# Match Payload's monorepo conventions: save exact versions (no caret), isolated linker, and
# don't hoist workspace packages — so a package can only import what it actually declares.
savePrefix: ''
nodeLinker: isolated
hoistWorkspacePackages: false
allowBuilds:
  '@parcel/watcher': false
  '@swc/core': true
  esbuild: true
  sharp: true
  unrs-resolver: true
# payload@3.85.1 pins undici exactly at 7.24.4, which is vulnerable (GHSA fixed in >=7.28.0).
# No newer payload exists, so override undici to a patched 7.x for payload's subtree only.
# (There WAS a `tsx: 4.19.4` pin here: payload pins tsx 4.22.4, whose namespaced tsImport leaked
# `?namespace=…` onto `node:` builtins under Node 23.5+'s sync module hooks, so every custom
# `payload <bin>` died with ENOENT node:crypto. payload 3.85.2 fixed it upstream — bin.js now nulls
# `module.registerHooks` so tsx falls back to its async register() path (payloadcms/payload#16949).
# Verified on Node 24.12 with tsx 4.22.4 unpinned: `payload seed` and `payload fonts:download` both
# work. Dropped. If it ever returns, `payload --use-swc <bin>` and `--disable-transpile` are escape
# hatches — but the real fix is payload >= 3.85.2.)
# next 16 optionally pulls sharp 0.34, which pnpm hoists — so payload's SharpDependency types
# resolved 0.34's Sharp/Metadata while apps import 0.35 (FormatEnum gained 'vips' → incompatible,
# forcing `as unknown as SharpDependency` casts). Pin one sharp everywhere so the casts can go.
overrides:
  payload>undici: '^7.28.0'
  sharp: '^0.35.2'
